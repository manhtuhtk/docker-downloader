name: Download Superset Docker Image
on:
  workflow_dispatch: # cho phép nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pull and Save Docker Image
        run: |
          docker pull apache/superset:6.0.0rc3-dev
          docker save apache/superset:6.0.0rc3-dev -o superset.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: superset-image # tên file khi tải
          path: superset.tar
          retention-days: 1 # tự xóa file sau 1 ngày
      