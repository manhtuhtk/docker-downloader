name: Download Bitnami Grafana Docker Image
on:
  workflow_dispatch: # cho phép nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pull and Save Docker Image
        run: |
          docker pull bitnami/grafana:latest
          docker save bitnami/grafana:latest -o grafana.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grafana-image # tên file khi tải
          path: grafana.tar
          retention-days: 1 # tự xóa file sau 1 ngày
      
