name: Download Redis Docker Image
on:
  workflow_dispatch: # cho phép nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pull and Save Docker Image
        run: |
          docker pull redis:3.2.12
          docker save redis:3.2.12 -o redis.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-image # tên file khi tải
          path: redis.tar
          retention-days: 1 # tự xóa file sau 1 ngày
      