name: Download Postgres Docker Image
on:
  workflow_dispatch: # cho phép nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pull and Save Docker Image
        run: |
          docker pull postgres:16
          docker save postgres:16 -o postgres.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-image # tên file khi tải
          path: postgres.tar
          retention-days: 1 # tự xóa file sau 1 ngày
      